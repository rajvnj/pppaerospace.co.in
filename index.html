<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podar Prep | Daycare Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hero-bg {
            background-color: #2b5a9e; /* Signature Blue */
            background-image: url('data:image/svg+xml,<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><path d="M0 0h20v20H0z" fill="%23ffffff" fill-opacity="0.05"/></svg>');
        }
        .yellow-accent { background-color: #f6d32d; }
        .text-outline {
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }
    </style>
</head>

<script>
  function openEnquireModal() {
    document.getElementById('enquireModal').classList.remove('hidden');
    document.getElementById('enquireModal').classList.add('flex');
  }

  function closeEnquireModal() {
    document.getElementById('enquireModal').classList.add('hidden');
    document.getElementById('enquireModal').classList.remove('flex');
  }

  // Close when clicking outside the modal
  document.getElementById('enquireModal').addEventListener('click', function(e) {
    if (e.target === this) closeEnquireModal();
  });
</script>

<!-- Enquiry Modal -->
<div id="enquireModal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-[999]">
  
  <div class="bg-white w-full max-w-3xl h-[90vh] rounded-xl shadow-2xl relative overflow-hidden">

    <!-- Close Button -->
    <button onclick="closeEnquireModal()" 
            class="absolute top-3 right-3 bg-yellow-400 text-blue-900 font-bold w-8 h-8 rounded-full flex items-center justify-center hover:brightness-110 z-10">
      ✕
    </button>

    <!-- Iframe -->
    <iframe 
      src="https://pppaerospace.co.in/enquiry.html"
      class="w-full h-full border-0"
      allowfullscreen
      loading="lazy">
    </iframe>

  </div>
</div>

        <button onclick="openEnquireModal()"
